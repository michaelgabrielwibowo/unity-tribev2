[pytest]
# Pytest configuration for TRIBE-Lite tests

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Output options
addopts = 
    -v
    --tb=short
    --strict-markers
    --disable-warnings

# Test markers
markers =
    unit: Unit tests for individual components
    integration: Integration tests for full pipeline
    slow: Tests that take >1s to run
